# git-cliff configuration — generate the changelog from Conventional Commits.
#
# Good commit messages ARE the changelog; this file is the single source of
# truth for how they are grouped. Do not hand-maintain CHANGELOG.md.
#   Full changelog:      git cliff -o CHANGELOG.md
#   Unreleased section:  git cliff --unreleased --prepend CHANGELOG.md
#   Tag a release:       git cliff --tag vX.Y.Z -o CHANGELOG.md

[changelog]
header = """
# Changelog

All notable changes to this project, generated from Conventional Commit
messages with git-cliff. Do not edit by hand.
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Features" },
  { message = "^fix", group = "Bug Fixes" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Refactor" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", group = "Testing" },
  { message = "^ci", group = "CI/CD" },
  { message = "^build", group = "Build" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "Miscellaneous" },
  { message = "^style", group = "Styling" },
]
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"

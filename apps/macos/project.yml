# XcodeGen spec for the macOS app. Generate the project with:
#   cd apps/macos && xcodegen generate
# Then open Gemina.xcodeproj in Xcode, select your Team, and Run.
#
# Phase 1: the status-led menu-bar app + shared logic frameworks.
# Phase 2 (this file): the Network Extension (packet tunnel) linking the Go core.
#
# Change the bundle id prefix below to your own namespace (a domain you own
# reversed, e.g. app.geminavpn — or keep this if you have no domain yet).

name: Gemina

options:
  bundleIdPrefix: com.joanmarcriera
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  GeminaVPNShared:
    type: framework
    platform: macOS
    sources:
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joanmarcriera.gemina.shared
        GENERATE_INFOPLIST_FILE: "YES"

  GeminaVPNCore:
    type: framework
    platform: macOS
    sources:
      - Core
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joanmarcriera.gemina.core
        GENERATE_INFOPLIST_FILE: "YES"

  GeminaTunnel:
    type: app-extension
    platform: macOS
    sources:
      - PacketTunnelExtension
    dependencies:
      - target: GeminaVPNCore
        embed: false
      - target: GeminaVPNShared
        embed: false
    preBuildScripts:
      - name: Build Go transport c-archive
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          export PATH="/opt/homebrew/bin:/usr/local/go/bin:$PATH"
          # Match the app's deployment target so the linker does not warn.
          export MACOSX_DEPLOYMENT_TARGET="${MACOSX_DEPLOYMENT_TARGET:-14.0}"
          export CGO_CFLAGS="-mmacosx-version-min=${MACOSX_DEPLOYMENT_TARGET}"
          cd "$SRCROOT/../.."
          go build -buildmode=c-archive \
            -o "$SRCROOT/build/libgeminacore.a" ./bridge/geminacore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joanmarcriera.gemina.tunnel
        CODE_SIGN_ENTITLEMENTS: Resources/GeminaTunnel.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: PacketTunnelExtension/Bridging-Header.h
        HEADER_SEARCH_PATHS: $(SRCROOT)/CGeminaCore/include
        LIBRARY_SEARCH_PATHS: $(SRCROOT)/build
        OTHER_LDFLAGS: "-lgeminacore -lresolv -framework CoreFoundation -framework Security"
    info:
      path: Resources/GeminaTunnel-Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.networkextension.packet-tunnel
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).GeminaTunnelProvider

  Gemina:
    type: application
    platform: macOS
    sources:
      - AppUI
    dependencies:
      - target: GeminaVPNCore
        embed: true
      - target: GeminaVPNShared
        embed: true
      - target: GeminaTunnel
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.joanmarcriera.gemina
        GENERATE_INFOPLIST_FILE: "YES"
        # Menu-bar (agent) app: no Dock icon, no main window.
        INFOPLIST_KEY_LSUIElement: "YES"
        CODE_SIGN_ENTITLEMENTS: Resources/Gemina.entitlements

# Prometheus configuration for the continuity gateway monitoring stack.
#
# The gateway is reached by container name on the private `continuity-mon`
# network — no IP address is committed and the metrics port is never published
# to the host. The alert rules are mounted read-only from the repo's single
# source of truth (observability/alerts/gateway-rules.yml).

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts/gateway-rules.yml

scrape_configs:
  - job_name: continuity-gateway
    metrics_path: /metrics
    scheme: http
    static_configs:
      - targets:
          - continuity-gateway:9090
        labels:
          service: continuity-gateway
          deployment: hosted

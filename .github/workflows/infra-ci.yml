name: Infrastructure CI

on:
  workflow_dispatch:
  push:
    paths:
      - "deploy/tofu/**"
      - ".github/workflows/infra-ci.yml"
  pull_request:
    paths:
      - "deploy/tofu/**"
      - ".github/workflows/infra-ci.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - run: tofu -chdir=deploy/tofu/environments/dev init -backend=false
      - run: tofu -chdir=deploy/tofu/environments/dev validate
      - run: tofu -chdir=deploy/tofu/environments/production init -backend=false
      - run: tofu -chdir=deploy/tofu/environments/production validate

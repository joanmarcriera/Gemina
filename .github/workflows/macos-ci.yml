name: macOS CI

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/macos/**"
      - ".swiftlint.yml"
      - ".github/workflows/macos-ci.yml"
  # No path filter on pull_request: the swift job is required by branch
  # protection, so it must report a status on every PR (see go-ci.yml).
  pull_request:

jobs:
  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: swift build --package-path apps/macos
      - run: brew install swiftlint
      - run: swiftlint lint --strict

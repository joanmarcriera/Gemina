name: macOS CI

on:
  workflow_dispatch:
  push:
    paths:
      - "apps/macos/**"
      - ".swiftlint.yml"
      - ".github/workflows/macos-ci.yml"
  pull_request:
    paths:
      - "apps/macos/**"
      - ".swiftlint.yml"
      - ".github/workflows/macos-ci.yml"

jobs:
  swift:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: swift build --package-path apps/macos
      - run: brew install swiftlint
      - run: swiftlint lint --strict

name: Go CI

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.work"
      - ".golangci.yml"
      - ".github/workflows/go-ci.yml"
  # No path filter on pull_request on purpose: the test and lint jobs are
  # required by branch protection, so they must report a status on EVERY PR.
  # A required check that never runs (filtered out) would block the PR forever.
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - name: build
        run: go build ./...
      - name: vet
        run: go vet ./...
      - name: gofmt
        run: |
          unformatted="$(gofmt -l $(find . -path './.research-src' -prune -o -name '*.go' -print))"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi
      - name: test -race
        run: go test -race ./...
      - name: client stays gateway-free
        run: |
          if go list -deps ./cmd/geminactl ./pkg/... \
              | grep -E 'gemina/(cmd/gateway|internal/gateway|internal/exit)'; then
            echo "::error::client imports gateway-side code — licence/architecture boundary violated"
            exit 1
          fi
          echo "ok: client is gateway-free"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2

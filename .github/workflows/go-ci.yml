name: Go CI

on:
  workflow_dispatch:
  push:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.work"
      - ".github/workflows/go-ci.yml"
  pull_request:
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.work"
      - ".github/workflows/go-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: go test ./...
      - run: test -z "$(gofmt -l $(find . -path './.research-src' -prune -o -name '*.go' -print))"

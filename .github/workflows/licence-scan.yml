name: Licence Scan

on:
  workflow_dispatch:
  push:
    paths:
      - "research/upstream-manifest.yaml"
      - "docs/legal/**"
      - "scripts/licence-check.sh"
      - ".github/workflows/licence-scan.yml"
  # No path filter on pull_request: the licence job is required by branch
  # protection, so it must report a status on every PR (see go-ci.yml).
  pull_request:

jobs:
  licence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.0
      - run: ./scripts/licence-check.sh
